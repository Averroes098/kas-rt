# railway.toml — Konfigurasi deployment Laravel 12 di Railway
# Dokumentasi: https://docs.railway.com/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "php-fpm -D && nginx -g 'daemon off;'"
healthcheckPath = "/up"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
